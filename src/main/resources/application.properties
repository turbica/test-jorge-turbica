spring.application.name=prices-api

# Active profile — overridden by environment variable SPRING_PROFILES_ACTIVE in production
spring.profiles.active=dev

# JPA — disable auto DDL so schema.sql is the single source of truth
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# SQL initialisation — must be always when using JPA (embedded DB default is 'embedded')
spring.sql.init.mode=always
