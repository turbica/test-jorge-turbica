# H2 console disabled in production — never expose it outside dev
spring.h2.console.enabled=false

# No SQL logging in production
spring.jpa.show-sql=false

logging.level.root=WARN
logging.level.com.jorgeturbica.prices=INFO

# Caffeine cache — larger TTL in production
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=2000,expireAfterWrite=300s
